    <script type="module">

      import { WASIShim } from "https://esm.sh/@bytecodealliance/preview2-shim/instantiation";
      import { instantiate } from "./transpiled/dotnet.js";

      console.log(instantiate);

      const loader = async (path) => {
        const buf = await fetch(`./transpiled/${path}`);
        return await WebAssembly.compile(await buf.arrayBuffer());
      };

      const importObject = new WASIShim().getImportObject();

      importObject["wasi:sockets/ip-name-lookup"].ResolveAddressStream =
        "DUMMY";
      importObject["wasi:sockets/network"].Network = "DUMMY";
      importObject["wasi:sockets/tcp"].TcpSocket = "DUMMY";
      importObject["wasi:sockets/udp"].IncomingDatagramStream = "DUMMY";
      importObject["wasi:sockets/udp"].OutgoingDatagramStream = "DUMMY";
      importObject["wasi:sockets/udp"].UdpSocket = "DUMMY";

      const instance = await instantiate(loader, importObject);
      //   dotnet.run.run();
      console.log(instance);
      instance.run.run();
    </script>
